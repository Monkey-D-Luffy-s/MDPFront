<nav class="bg-black text-white shadow-lg sticky top-0 z-[100]">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      
      <div class="flex-shrink-0 flex items-center">
        <span class="text-xl font-bold tracking-wider text-blue-500">MDP.Store</span>
      </div>

      <div class="hidden md:flex items-center space-x-4">
        <div class="relative group">
          <button class="hover:text-white transition py-2 ">
            Products
          </button>
          <div
            class="absolute left-0 mt-2 w-48 bg-gray-800 rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition duration-200"
          >
            <a routerLink="/products" class="block px-4 py-2 hover:bg-gray-700 transition">Add Product</a>

            <a
              class="block px-4 py-2 hover:bg-gray-700 transition"
              href="/productlist"
            >
              Products
            </a>

            <a
              class="block px-4 py-2 hover:bg-gray-700 transition"
              href="#"
            >
              Assing Roles
            </a>

            <a
              class="block px-4 py-2 hover:bg-gray-700 transition"
              href="#"
            >
              Cloud Services
            </a>
          </div>
        </div>
        <a routerLink="/about" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-800 transition">About</a>
        <a routerLink="/dashboards" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-800 transition">Dashboards</a>
         <div class="relative group">
          <button class="hover:text-white transition">
            Services
          </button>
          <div
            class="absolute left-0 mt-2 w-48 bg-gray-800 rounded-md shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition duration-200"
          >
            <a
              class="block px-4 py-2 hover:bg-gray-700 transition"
              href="/users"
            >
              Create User
            </a>

            <a
              class="block px-4 py-2 hover:bg-gray-700 transition"
              href="#"
            >
              Assing Roles
            </a>

            <a
              class="block px-4 py-2 hover:bg-gray-700 transition"
              href="#"
            >
              Cloud Services
            </a>
          </div>
        </div>
        <button class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-bold transition">Admin</button>

        <div *ngIf="!isloggedIn()" class="flex items-center gap-2 border-l border-zinc-800 ml-2 pl-4">
          <a routerLink="/login" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-800 transition">Login</a>
          <a routerLink="/register" class="px-3 py-2 rounded-md text-sm font-medium bg-zinc-800 hover:bg-zinc-700 transition">Register</a>
        </div>

        <div *ngIf="isloggedIn() && user()" class="relative group ml-4">
          <div class="flex items-center gap-3 cursor-pointer p-1 pr-3 hover:bg-zinc-800 rounded-full transition-all border border-transparent hover:border-zinc-700">
            <img 
              [src]="user()?.profilePictureUrl || 'assets/default-avatar.png'" 
              class="w-8 h-8 rounded-full border border-zinc-700 object-cover"
            >
            <span class="text-sm font-medium">Hi, {{ user().firstName }}</span>
            <svg class="h-4 w-4 text-zinc-400 group-hover:rotate-180 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </div>

          <div class="absolute right-0 mt-2 w-48 origin-top-right rounded-xl bg-zinc-900 border border-zinc-800 p-2 shadow-2xl 
                      invisible opacity-0 scale-95 group-hover:visible group-hover:opacity-100 group-hover:scale-100 
                      transition-all duration-200 ease-out">
            
            <button (click)="goToProfile()" class="w-full text-left px-4 py-2 text-sm text-zinc-300 hover:bg-zinc-800 hover:text-white rounded-md transition-colors flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
              Profile
            </button>
          
            <div class="my-1 border-t border-zinc-800"></div>
          
            <button (click)="onLogout()" class="w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-red-500/10 rounded-md transition-colors flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
              Logout
            </button>
          </div>
        </div>
      </div>

      <div class="-mr-2 flex md:hidden">
        <button (click)="toggleMenu()" type="button" class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-800 focus:outline-none">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="isMenuOpen" class="md:hidden bg-zinc-950 border-t border-zinc-800 animate-in slide-in-from-top duration-200">
    <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
      <a routerLink="/home" class="block px-3 py-2 rounded-md text-base font-medium hover:bg-zinc-800">Home</a>
      <a routerLink="/dashboards" class="block px-3 py-2 rounded-md text-base font-medium hover:bg-zinc-800">Dashboards</a>
      <a routerLink="/about" class="block px-3 py-2 rounded-md text-base font-medium hover:bg-zinc-800">About</a>
      <div *ngIf="!isloggedIn()" class="flex items-center gap-2 border-l border-zinc-800 ml-2 pl-4">
          <a routerLink="/login" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-800 transition">Login</a>
          <a routerLink="/register" class="px-3 py-2 rounded-md text-sm font-medium bg-zinc-800 hover:bg-zinc-700 transition">Register</a>
      </div>
      <div *ngIf="isloggedIn()" class="border-t border-zinc-800 pt-2">
        <a (click)="goToProfile()" class="block px-3 py-2 rounded-md text-base font-medium text-zinc-300">Profile</a>
        <button (click)="onLogout()" class="w-full text-left block px-3 py-2 rounded-md text-base font-medium text-red-400">Logout</button>
      </div>
    </div>
  </div>
</nav>
