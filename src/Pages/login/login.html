<div class="min-h-screen bg-black flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-2xl">
    
    <div class="text-center mb-10">
      <h1 class="text-3xl font-bold text-white tracking-tight">Welcome Back</h1>
      <p class="text-zinc-500 mt-2">Enter your credentials to access your account</p>
    </div>

    <form class="space-y-6">
      <div>
        <label for="email" class="block text-sm font-medium text-zinc-400 mb-2">Email Address</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="name"
          [ngModelOptions]="{standalone: true}"
          name="email"
          class="w-full bg-zinc-950 border border-zinc-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all placeholder:text-zinc-700"
          placeholder="name@aptol.com">
      </div>

      <div>
        <div class="flex justify-between mb-2">
          <label for="password" class="block text-sm font-medium text-zinc-400">Password</label>
          <a href="#" class="text-xs text-blue-500 hover:text-blue-400 transition">Forgot password?</a>
        </div>
        <input 
          type="password" 
          id="password" 
            [(ngModel)]="password"
            [ngModelOptions]="{standalone: true}"
          name="password"
          class="w-full bg-zinc-950 border border-zinc-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all placeholder:text-zinc-700"
          placeholder="••••••••">
      </div>

    

      <button 
        type="submit" 
        (click)="onLogin()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg shadow-lg shadow-blue-900/20 transform transition active:scale-[0.98]">
        Sign In
      </button>
    </form>

    <p class="text-center text-zinc-500 text-sm mt-8">
      Don't have an account? 
      <a href="#" class="text-white font-medium hover:underline underline-offset-4">Contact Admin</a>
    </p>
  </div>
</div>
