<div class="min-h-screen bg-slate-950 flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-8">
    
    <h2 class="text-2xl font-bold text-white mb-2">Get in Touch</h2>
    <p class="text-slate-400 mb-8">Fill out the form below to reach the backend.</p>

    <div *ngIf="submitted" class="mb-6 p-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-lg text-sm">
      Form submitted successfully!
    </div>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Product Name</label>
        <input 
          formControlName="ProductName"
          type="text" 
          placeholder="Product Name"
          class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-slate-500"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Product Description</label>
        <textarea 
          formControlName="ProductDescription"
          rows="4" 
          placeholder="Product Description"
          class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-slate-500"
        ></textarea>
       
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">Unit Price</label>
        <input 
          formControlName="UnitPrice"
          type="number" 
          placeholder="Unit Price"
          class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-slate-500"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-1.5">In Stock</label>
        <input 
          formControlName="InStock"
          type="number" 
          placeholder="In Stock"
          class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder:text-slate-500"
        />
      </div>
     
      <div>
        <label class="block text-sm font-medium mb-1.5 text-slate-400">Profile Image</label>
        <div class="relative flex items-center justify-center w-full">
          <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-700 border-dashed rounded-lg cursor-pointer bg-slate-800 hover:bg-slate-750 transition-colors">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
              <svg class="w-8 h-8 mb-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
              <p class="text-sm text-slate-400">
                <span class="font-semibold">Click to upload</span> or drag and drop
              </p>
              <p class="text-xs text-slate-500 mt-1" *ngIf="!ProductImgURL">PNG, JPG or WEBP</p>
              <p class="text-xs text-indigo-400 mt-1 font-medium" *ngIf="ProductImgURL">{{ ProductImgURL.name }}</p>
            </div>
            <input type="file" class="hidden" (change)="onProductImgURL($event)" accept="image/*" />
          </label>
        </div>
      </div>
       <div>
        <label class="block text-sm font-medium mb-1.5 text-slate-400">Profile Image</label>
        <div class="relative flex items-center justify-center w-full">
          <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-700 border-dashed rounded-lg cursor-pointer bg-slate-800 hover:bg-slate-750 transition-colors">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
              <svg class="w-8 h-8 mb-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
              <p class="text-sm text-slate-400">
                <span class="font-semibold">Click to upload</span> or drag and drop
              </p>
              <p class="text-xs text-slate-500 mt-1" *ngIf="!ProductImgUrl2">PNG, JPG or WEBP</p>
              <p class="text-xs text-indigo-400 mt-1 font-medium" *ngIf="ProductImgUrl2">{{ ProductImgUrl2.name }}</p>
            </div>
            <input type="file" class="hidden" (change)="onProductImgUrl2($event)" accept="image/*" />
          </label>
        </div>
      </div>
      
      
     
     

      <button 
        type="submit" 
        [disabled]="contactForm.invalid || isSubmitting"
        class="w-full bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition-colors shadow-lg shadow-indigo-500/20 flex items-center justify-center"
      >
        <span *ngIf="!isSubmitting">Send Message</span>
        <span *ngIf="isSubmitting" class="flex items-center">
          <svg class="animate-spin h-5 w-5 mr-2 text-white" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Processing...
        </span>
      </button>
    </form>
  </div>
</div>
