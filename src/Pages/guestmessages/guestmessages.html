<div class="flex flex-col justify-center items-center w-full mx-auto p-4">
  <h1 class="text-3xl font-bold mb-6 text-center">Add Messages</h1>
    <form class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-6 w-full lg:w-1/2 md:w-2/3 sm:w-full">
        <div class="">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="name">Name</label>
            <div class="relative w-full group overflow-hidden rounded">
            <input
            [(ngModel)]="name"
            [ngModelOptions]="{standalone: true}"
             class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" id="name" type="text" placeholder="Your Name">
                <div class="absolute left-3 px-3 right-3 bottom-0 h-0.5 bg-teal-500 scale-x-0 transition-transform duration-300 origin-start group-hover:scale-x-100">

                </div>
            </div>
        </div>
        <div class="">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="message">Message</label>
            <div class="relative w-full group overflow-hidden rounded">
                <textarea 
                [(ngModel)]="message"
            [ngModelOptions]="{standalone: true}"
                class="shadow appearance-none border rounded w-full px-3 text-gray-700 leading-tight focus:shadow-outline" id="message" placeholder="Your Message"></textarea>                
                <div class="absolute left-3 px-3 right-3 bottom-1 h-0.5 bg-teal-500 scale-x-0 transition-transform duration-300 origin-start group-hover:scale-x-100">

                </div>
            </div>
        </div>
        <button type="button" (click)="onAdd()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Submit</button>

    </form>
 <div class="flex flex-wrap gap-2 justify-center items-center mt-4">
<app-guestcard *ngFor="let guest of guests" [childguest]="guest" (delete)="onDelete(guest.id)"></app-guestcard>    </div>
</div>
