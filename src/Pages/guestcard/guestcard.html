<div class="group relative flex flex-col min-w-[18rem] min-h-[10rem] rounded-xl bg-zinc-900 border p-5 transition-all duration-200 hover:border-teal-500/50 hover:shadow-[0_0_20px_rgba(20,184,166,0.1)]">
    
    <div class="flex justify-between items-start mb-4">
        <div class="flex items-center gap-3">
            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-teal-400 to-blue-500 text-white font-bold shadow-lg">
                {{childguest?.guestName?.[0] | uppercase}}
            </div>
            <div>
                <p class="text-zinc-100 font-semibold leading-none">{{childguest?.guestName}}</p>
                <p class="text-zinc-500 text-xs mt-1">Guest</p>
            </div>
        </div>
          
        <button 
            (click)="onDelete(childguest?.id)"
            class="text-zinc-500 hover:text-red-400 transition-colors p-1"
            title="Delete Message">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </button>
    </div>

    <div class="flex-grow">
        <p class="text-zinc-300 text-sm italic leading-relaxed">
            "{{childguest?.message}}"
        </p>
    </div>

    <div class="absolute bottom-0 left-0 h-1 w-full bg-gradient-to-r from-teal-500 to-blue-500 rounded-b-md transform scale-x-0 transition-transform duration-500 group-hover:scale-x-100 origin-center"></div>
</div>
