name: Angular CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-angular:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 # Match your local node version

    - name: Install dependencies
      run: npm ci # This is faster and cleaner than 'npm install' for CI

    - name: Lint (Optional but recommended)
      run: npm run lint

    - name: Run Tests
      # We use --watch=false and --browsers=ChromeHeadless for CI environments
      run: npx ng test --watch=false --browsers=ChromeHeadless
